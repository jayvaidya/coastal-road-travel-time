name: collect-travel-times

on:
  # Triggered externally by cron-job.org (every 10 min, 07:00-23:00 IST) via the
  # workflow_dispatch API -- more punctual than GitHub's built-in cron, which
  # silently drops scheduled runs under load. The GitHub `schedule:` trigger was
  # removed to avoid double-firing (duplicate readings + double API cost).
  workflow_dispatch: {}

# Prevent overlapping runs from racing on the same CSV / git push.
concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Poll Routes API and append row
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: python collect.py

      - name: Commit new data
        run: |
          git config user.name  "traffic-bot"
          git config user.email "traffic-bot@users.noreply.github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          # -f because data/travel_times.csv is gitignored (to keep local fake
          # data out of the repo); the real data must still be committed here.
          git add -f data/travel_times.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: travel times $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
